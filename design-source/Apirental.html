<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apirental — Luxury Car Rental</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    /* Apply saved theme + accent before first paint to avoid flash */
    (function () {
      try {
        var th = localStorage.getItem("apirental.theme") || "dark";
        document.documentElement.dataset.theme = th;
      } catch (e) { document.documentElement.dataset.theme = "dark"; }
      try {
        var acc = JSON.parse(localStorage.getItem("apirental.accent"));
        if (acc && acc.length) {
          var r = document.documentElement, n = parseInt(acc[0].replace("#", ""), 16);
          var R = (n >> 16) & 255, G = (n >> 8) & 255, B = n & 255;
          r.style.setProperty("--gold", acc[0]);
          r.style.setProperty("--gold-hi", acc[1]);
          r.style.setProperty("--gold-dim", acc[2]);
          r.style.setProperty("--gold-glow", "rgba(" + R + "," + G + "," + B + ",0.24)");
          r.style.setProperty("--gold-ink", ((R * 0.299 + G * 0.587 + B * 0.114) / 255) > 0.6 ? "#0b0b10" : "#ffffff");
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
